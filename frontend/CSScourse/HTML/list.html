<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS List</title>
    <link rel="stylesheet" href="../CSS/liststyle.css">
</head>
<body>
    <header>
        <h1>CSS list</h1>
    </header>
    <main>
        <article>
            <h2>Ordered list</h2>
            <ol start="3" reversed>
                <li value="25">step one</li>
                <li>step two</li>
                <li>step three</li>
            </ol>
        </article>
        <article>
            <h2>Unordered list</h2>
            <ul>
                <li>step one</li>
                <li>step two</li>
                <li>step three</li>
            </ul>
        </article>
    </main>
</body>
</html>
